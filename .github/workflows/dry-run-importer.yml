name: dry-run-importer

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-update-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show data update files
        run: |
          find data-updates -maxdepth 3 -type f | sort || true

      - name: Placeholder dry-run
        run: |
          echo "Future step: dotnet run --project src/Importer/PublicOfficialInterest.Importer.csproj -- data-updates/YYYY-MM-DD/changes.json"
          echo "Future step: validate JSON schema, block dangerous actions, and check secrets"
