name: sync-real-public-data

on:
  schedule:
    - cron: '22 18 * * *'
    - cron: '42 18 * * 0'
  workflow_dispatch:
    inputs:
      write:
        description: 'Write to Supabase when secrets are configured'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dry-run real public data sync
        run: npm run sync:real-data:dry-run

      - name: Write weekly sync to Supabase
        if: ${{ github.event_name == 'schedule' && github.event.schedule == '42 18 * * 0' || github.event.inputs.write == 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing Supabase write secrets; skipping write."
            exit 0
          fi

          npm run sync:real-data:write
