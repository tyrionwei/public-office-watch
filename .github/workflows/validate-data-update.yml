name: validate-data-update

on:
  pull_request:
    branches:
      - main
      - chore/**
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/Importer/PublicOfficialInterest.Importer.csproj

      - name: Build
        run: dotnet build src/Importer/PublicOfficialInterest.Importer.csproj --no-restore --configuration Release

      - name: Importer dry-run sample
        run: dotnet run --project src/Importer/PublicOfficialInterest.Importer.csproj -- samples/sample-changes.json

      - name: Importer dry-run latest data-update changes when present
        shell: bash
        run: |
          if [ -d "data-updates" ]; then
            latest=$(find data-updates -mindepth 2 -maxdepth 2 -name changes.json | sort | tail -n 1)
            if [ -n "$latest" ]; then
              echo "Running dry-run for $latest"
              dotnet run --project src/Importer/PublicOfficialInterest.Importer.csproj -- "$latest"
            else
              echo "No data-updates changes.json found, skipping."
            fi
          else
            echo "data-updates directory does not exist, skipping."
          fi

      - name: Safety note
        run: |
          echo "Phase 1 only performs dry-run validation."
          echo "No Supabase connection and no production database writes occur here."
